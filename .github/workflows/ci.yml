name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "::error::DOCKERHUB_USERNAME is empty or missing"
            exit 1
          fi

          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::DOCKERHUB_TOKEN is empty or missing"
            exit 1
          fi

          if [[ "${DOCKERHUB_USERNAME}" == *"@"* ]]; then
            echo "::error::DOCKERHUB_USERNAME must be your Docker Hub username or namespace, not an email address"
            exit 1
          fi

          if printf '%s' "${DOCKERHUB_USERNAME}" | grep -q '[[:space:]]'; then
            echo "::error::DOCKERHUB_USERNAME contains whitespace"
            exit 1
          fi

          if printf '%s' "${DOCKERHUB_TOKEN}" | grep -q '[[:space:]]'; then
            echo "::error::DOCKERHUB_TOKEN contains whitespace or a newline; paste only the raw Docker Hub token value"
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/stock-trading
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
