name: CI (KR)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "kr/k8s/**"
      - "**.md"
      - "guidance/**"
  pull_request:
    paths:
      - "kr/**"
      - "!kr/k8s/**"
      - ".github/workflows/ci-kr.yml"
  workflow_dispatch:

env:
  DOCKER_IMAGE: neidn/stock-trading-kr

jobs:
  # ── Job 1: lint ──────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kr

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies (no TA-Lib C compile in lint)
        run: pip install aiohttp python-dotenv python-dateutil pytz python-telegram-bot structlog pytest pytest-asyncio

      - name: Check imports resolve
        env:
          TRADING_MODE: paper
          KIS_APP_KEY: dummy
          KIS_APP_SECRET: dummy
          KIS_ACCOUNT_NO: "0000000000-01"
          TELEGRAM_BOT_TOKEN: dummy
          TELEGRAM_CHAT_ID: "0"
        run: |
          python -c "
          from src.utils.config import load_config
          from src.risk.market_hours import is_market_open, is_trading_day
          from src.ingest.kis_rest import KISRestClient
          from src.ingest.kis_ws import KISWSManager
          print('OK')
          "

  # ── Job 2: test ──────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kr

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system deps for TA-Lib
        run: sudo apt-get install -y gcc g++

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          TRADING_MODE: paper
          KIS_APP_KEY: dummy
          KIS_APP_SECRET: dummy
          KIS_ACCOUNT_NO: "0000000000-01"
          TELEGRAM_BOT_TOKEN: dummy
          TELEGRAM_CHAT_ID: "0"
        run: pytest tests/unit/ -q --tb=short

  # ── Job 3: build each platform in parallel ───────────────────────────────────
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: kr
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.DOCKER_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Job 4: merge platform digests into multi-arch manifest ───────────────────
  merge:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.DOCKER_IMAGE }}@sha256:%s ' *)

      - name: Inspect final image
        run: |
          docker buildx imagetools inspect \
            ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.version }}
