name: CI (KR)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "kr/k8s/**"
      - "**.md"
      - "guidance/**"
  pull_request:
    paths:
      - "kr/**"
      - "!kr/k8s/**"
      - ".github/workflows/ci-kr.yml"
  workflow_dispatch:

env:
  DOCKER_IMAGE: neidn/stock-trading-kr

jobs:
  # ── Job 1: lint ──────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kr

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check imports resolve
        run: python -c "from screener.config import Settings; from screener.kis_client import KISClient; from screener.screener import StockScreener; from screener.notifier import TelegramNotifier; print('OK')"

  # ── Jobs 2 & 3 (build + merge) disabled — push manually until CI secret fixed ──
