name: CI (KR)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "kr/k8s/**"
      - "**.md"
      - "guidance/**"
  pull_request:
    paths:
      - "kr/**"
      - "!kr/k8s/**"
      - ".github/workflows/ci-kr.yml"
  workflow_dispatch:

env:
  DOCKER_IMAGE: neidn/stock-trading-kr

jobs:
  # ── Job 1: lint ──────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kr

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies (no TA-Lib C compile in lint)
        run: pip install aiohttp python-dotenv python-dateutil pytz python-telegram-bot structlog pytest pytest-asyncio

      - name: Check imports resolve
        env:
          TRADING_MODE: paper
          KIS_APP_KEY: dummy
          KIS_APP_SECRET: dummy
          KIS_ACCOUNT_NO: "0000000000-01"
          TELEGRAM_BOT_TOKEN: dummy
          TELEGRAM_CHAT_ID: "0"
        run: |
          python -c "
          from src.utils.config import load_config
          from src.risk.market_hours import is_market_open, is_trading_day
          from src.ingest.kis_rest import KISRestClient
          from src.ingest.kis_ws import KISWSManager
          print('OK')
          "

  # ── Job 2: test ──────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kr

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system deps for TA-Lib
        run: sudo apt-get install -y gcc g++

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          TRADING_MODE: paper
          KIS_APP_KEY: dummy
          KIS_APP_SECRET: dummy
          KIS_ACCOUNT_NO: "0000000000-01"
          TELEGRAM_BOT_TOKEN: dummy
          TELEGRAM_CHAT_ID: "0"
        run: pytest tests/unit/ -q --tb=short

  # ── Job 3: build & push (main branch + tags only) ────────────────────────────
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache QEMU binaries
        uses: actions/cache@v4
        with:
          path: /tmp/.qemu-cache
          key: qemu-arm64-${{ runner.os }}

      - name: Set up QEMU (arm64 only)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: kr
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:cache,mode=max
