apiVersion: apps/v1
kind: Deployment
metadata:
  name: safety-monitor
  namespace: trading-stock-kr
  labels:
    app: safety-monitor
    app.kubernetes.io/part-of: binance-futures-autotrading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: safety-monitor
  template:
    metadata:
      labels:
        app: safety-monitor
    spec:
      restartPolicy: Always

      # Highest scheduling priority — survives node pressure
      priorityClassName: system-node-critical

      imagePullSecrets:
        - name: dockerhub-credentials

      # Schedule on the node that owns the SQLite PVC
      nodeSelector:
        storage: sqlite-node

      containers:
        - name: safety-monitor
          image: neidn/binance-futures-trading:latest
          imagePullPolicy: Always
          command: ["python", "-m", "src.safety.safety_monitor_main"]
          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: trading-config
            - secretRef:
                name: binance-api-secret
            - secretRef:
                name: telegram-secret

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

          volumeMounts:
            - name: sqlite-data
              mountPath: /data

      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: sqlite-pvc
