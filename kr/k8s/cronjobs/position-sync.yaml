# Position sync with Binance API — every 5 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: position-sync
  namespace: trading-stock-kr
  labels:
    app: position-sync
    app.kubernetes.io/part-of: binance-futures-autotrading
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: position-sync
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: dockerhub-credentials
          nodeSelector:
            storage: sqlite-node
          volumes:
            - name: trading-db
              persistentVolumeClaim:
                claimName: sqlite-pvc
          containers:
            - name: position-sync
              image: neidn/binance-futures-trading:latest
              imagePullPolicy: Always
              command: ["python", "-m", "src.jobs.position_sync"]
              envFrom:
                - configMapRef:
                    name: trading-config
                - secretRef:
                    name: binance-api-secret
                - secretRef:
                    name: telegram-secret
              env:
                - name: DB_PATH
                  value: /data/trading.db
              volumeMounts:
                - name: trading-db
                  mountPath: /data
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"
