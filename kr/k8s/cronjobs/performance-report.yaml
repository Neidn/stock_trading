# Daily performance report — 00:00 UTC (09:00 KST)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: performance-report
  namespace: trading-stock-kr
  labels:
    app: performance-report
    app.kubernetes.io/part-of: kr-stock-autotrading
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: performance-report
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            storage: sqlite-node
          volumes:
            - name: trading-db
              persistentVolumeClaim:
                claimName: sqlite-pvc
          containers:
            - name: report
              image: neidn/stock-trading-kr:latest
              imagePullPolicy: Always
              command: ["python", "-m", "src.jobs.daily_report"]
              envFrom:
                - configMapRef:
                    name: trading-config
                - secretRef:
                    name: telegram-secret
              env:
                - name: DB_PATH
                  value: /data/trading.db
              volumeMounts:
                - name: trading-db
                  mountPath: /data
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "200m"
