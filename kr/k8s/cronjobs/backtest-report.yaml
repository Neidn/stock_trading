# Monthly backtest report — 1st of each month at 00:00 UTC (09:00 KST)
# Compares current strategy params vs best found in last 12 months of OHLCV.
# Sends result to Telegram. Does NOT auto-apply params.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backtest-report
  namespace: trading-stock-kr
  labels:
    app: backtest-report
    app.kubernetes.io/part-of: binance-futures-autotrading
spec:
  schedule: "0 0 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: backtest-report
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: dockerhub-credentials
          containers:
            - name: backtest-report
              image: neidn/binance-futures-trading:latest
              imagePullPolicy: Always
              command: ["python", "-m", "src.jobs.backtest_report"]
              envFrom:
                - configMapRef:
                    name: trading-config
                - secretRef:
                    name: telegram-secret
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
