# DB archiver — every Sunday at 00:00 UTC
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-archiver
  namespace: trading-stock-kr
  labels:
    app: db-archiver
    app.kubernetes.io/part-of: kr-stock-autotrading
spec:
  schedule: "0 0 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: db-archiver
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            storage: sqlite-node
          volumes:
            - name: trading-db
              persistentVolumeClaim:
                claimName: sqlite-pvc
          containers:
            - name: db-archiver
              image: neidn/stock-trading-kr:latest
              imagePullPolicy: Always
              command: ["python", "-m", "src.jobs.db_archiver"]
              envFrom:
                - configMapRef:
                    name: trading-config
              env:
                - name: DB_PATH
                  value: /data/trading.db
              volumeMounts:
                - name: trading-db
                  mountPath: /data
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "200m"
