apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# US trading system — shared infra + US-specific workloads.
# Apply: kubectl apply -k kr/k8s/overlays/us

resources:
  - ../../base

  # US deployments
  - ../../deployments/dashboard-us.yaml
  - ../../deployments/data-ingest-us.yaml
  - ../../deployments/signal-engine-us.yaml

  # US ingressroute
  - ../../ingressroutes/dashboard-us-ingressroute.yaml
