# ─── HTTPS ────────────────────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard-us
  namespace: trading-stock-kr
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`stock-us-dashboard.neidn.com`)
      kind: Rule
      services:
        - name: dashboard-us-svc
          port: 80
  tls:
    certResolver: letsencrypt

---
# ─── HTTP → HTTPS 리다이렉트 ──────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard-us-http
  namespace: trading-stock-kr
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`stock-us-dashboard.neidn.com`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
          namespace: trading-stock-kr
      services:
        - name: dashboard-us-svc
          port: 80
