apiVersion: v1
kind: Service
metadata:
  name: data-ingest-svc
  namespace: trading-stock-kr
spec:
  selector:
    app: data-ingest
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: signal-engine-svc
  namespace: trading-stock-kr
spec:
  selector:
    app: signal-engine
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: safety-monitor-svc
  namespace: trading-stock-kr
spec:
  selector:
    app: safety-monitor
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
