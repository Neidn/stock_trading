# KRX pre-market screener — 08:50 KST (23:50 UTC) weekdays Mon-Fri
# Second run just before market open (09:00 KST) for final symbol selection.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: screener-late
  namespace: trading-stock-kr
  labels:
    app: screener
    app.kubernetes.io/part-of: kr-stock-autotrading
spec:
  schedule: "50 23 * * 1-5"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: screener
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            storage: sqlite-node
          volumes:
            - name: trading-db
              persistentVolumeClaim:
                claimName: sqlite-pvc
          containers:
            - name: screener
              image: ghcr.io/neidn/stock-trading-kr:latest
              imagePullPolicy: Always
              command: ["python", "-m", "src.jobs.screener"]
              envFrom:
                - configMapRef:
                    name: trading-config
                - secretRef:
                    name: trading-secret
                - secretRef:
                    name: telegram-secret
              env:
                - name: DB_PATH
                  value: /data/trading.db
              volumeMounts:
                - name: trading-db
                  mountPath: /data
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"
