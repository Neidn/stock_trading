apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-config
  namespace: trading-stock-kr
  labels:
    app.kubernetes.io/part-of: kr-stock-autotrading
data:
  TRADING_MODE: "paper"          # paper | live
  LIVE_CONFIRM: "LIVE"           # required when TRADING_MODE=live
  ACTIVE_STRATEGY: "rsi_macd"
  STRATEGY_PARAMS_RSI_MACD: |
    {"rsi_period": 14, "rsi_oversold": 35, "rsi_overbought": 65,
     "fast_period": 12, "slow_period": 26, "signal_period": 9,
     "vol_multiplier": 1.3,
     "sl_atr_mult": 2.0, "tp1_atr_mult": 3.0, "tp2_atr_mult": 5.0}
  STRATEGY_PARAMS_EMA_PULLBACK_RSI: |
    {"ema_fast": 20, "ema_mid": 50, "ema_slow": 200, "rsi_period": 14,
    "adx_period": 14, "adx_threshold": 30.0, "rsi_low": 45.0, "rsi_high": 65.0,
    "sl_atr_mult": 2.5, "tp1_atr_mult": 3.0, "tp2_atr_mult": 5.0}
  STRATEGY_PARAMS_RSI_SUPERTREND: |
    {"atr_period": 10, "rsi_period": 14, "multiplier": 2.0, "rsi_threshold": 55.0,
    "sl_atr_mult": 2.5, "tp1_atr_mult": 4.0, "tp2_atr_mult": 6.0}
  STRATEGY_PARAMS_BB_RSI_CHARTART: |
    {"rsi_period": 6, "rsi_level": 50, "bb_period": 50, "bb_std": 2.0,
    "sl_atr_mult": 2.0, "tp1_atr_mult": 3.0, "tp2_atr_mult": 5.0}
  STRATEGY_PARAMS_EMA_CROSSOVER: |
    {"ema_fast": 20, "ema_slow": 50, "adx_period": 14, "adx_threshold": 20.0,
    "sl_atr_mult": 2.5, "tp1_atr_mult": 3.0, "tp2_atr_mult": 4.0}
  STRATEGY_PARAMS_MACD_SMA200_CHARTART: |
    {"fast_period": 12, "slow_period": 26, "signal_period": 9, "sma200_period": 200,
    "sl_atr_mult": 2.0, "tp1_atr_mult": 3.0, "tp2_atr_mult": 4.0}
  STRATEGY_PARAMS_SUPERTREND: |
    {"atr_period": 10, "multiplier": 2.0,
    "sl_atr_mult": 2.0, "tp1_atr_mult": 2.5, "tp2_atr_mult": 6.0}
  STRATEGY_PARAMS_BB_BREAKOUT: |
    {"bb_period": 20, "bb_std": 2.0, "squeeze_window": 20, "squeeze_pct": 0.8,
    "vol_multiplier": 1.5, "sl_atr_mult": 1.5, "tp1_atr_mult": 2.5, "tp2_atr_mult": 4.5}

  RISK_PER_TRADE: "0.01"
  MAX_POSITIONS: "5"
  DAILY_LOSS_LIMIT: "0.05"

  MARKET: "BOTH"                 # KOSPI | KOSDAQ | BOTH
  ALLOW_OVERNIGHT: "false"
  FORCE_CLOSE_TIME: "15:20"

  FALLBACK_BALANCE_KRW: "10000000"  # used in paper mode (VTS doesn't support balance API)

  SQLITE_DB_PATH: "/data/trading.db"
  LOG_LEVEL: "INFO"
